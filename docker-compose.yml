name: crud-fastapi

services:
  db: 
    image: postgres:16
    container_name: postgres
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
  
  app:
    build: .
    container_name: app
    depends_on:
      - db

    ports: 
      - "8000:8000"
    
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/demo

volumes:
  postgres_data:


